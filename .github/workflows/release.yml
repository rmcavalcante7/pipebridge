name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Validate release version consistency
        run: python scripts/validate_release_metadata.py --tag "${{ github.ref_name }}" --dist-dir dist

      - name: Validate distribution
        run: twine check dist/*

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          {
            printf '%s\n' 'body<<EOF'
            printf '%s\n\n' 'Automated release generated from git tag.'
            printf '%s\n' 'Artifacts:'
            find dist -maxdepth 1 -type f -printf '%f\n'
            printf '\n%s\n' 'Recent commits:'
            git log --pretty=format:'- %s' -n 20
            printf '\n%s\n' 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/*
